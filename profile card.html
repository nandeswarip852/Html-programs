<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.card{
    background:white;
    width:300px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    padding:25px;
}

.card img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid #2575fc;
}

.name{
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
}

.role{
    color:gray;
    font-size:16px;
}

.desc{
    font-size:14px;
    margin:15px 0;
}

.buttons a{
    text-decoration:none;
    color:white;
    background:#2575fc;
    padding:8px 15px;
    margin:5px;
    border-radius:20px;
    display:inline-block;
}

.buttons a:hover{
    background:#1a5ad9;
}
</style>
</head>

<body>

<div class="card">
    <img src="https://i.pravatar.cc/150?img=3" alt="Profile Picture">
    <div class="name">John Doe</div>
    <div class="role">Web Developer</div>
    <p class="desc">
        Passionate about creating modern and responsive websites using HTML, CSS, and JavaScript.
    </p>

    <div class="buttons">
        <a href="#">Follow</a>
        <a href="#">Message</a>
    </div>
</div>

</body>
</html>
